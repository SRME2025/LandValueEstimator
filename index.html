<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVMIS Land Valuer (Enforced Logic)</title>
    <style>
        :root {
            --primary: #059669;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #cbd5e1;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        .valuation-header {
            text-align: center;
            background: linear-gradient(135deg, #065f46 0%, #059669 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .valuation-header h1 { margin: 0; font-size: 1.1rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .price-display { font-size: 3.2rem; font-weight: 800; margin-top: 10px; }

        .card { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        section { margin-bottom: 30px; }
        h2 { font-size: 1.1rem; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #ecfdf5; padding-bottom: 8px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        
        .radio-box-group { display: flex; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .radio-option { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }

        label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        input[type="number"], select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        input[type="radio"] { width: 18px; height: 18px; accent-color: var(--primary); }

        .unit { font-size: 0.8rem; color: #94a3b8; }
        .warning { color: #f59e0b; font-size: 0.85rem; font-weight: 600; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="valuation-header">
        <h1>Estimated Land Value (2026)</h1>
        <div class="price-display" id="priceOutput">Select Terrain...</div>
        <div id="statusMessage" class="warning">Please complete all fields to see valuation</div>
    </div>

    <div class="card">
        <section>
            <h2>Infrastructure & Zoning Enforcements</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Zoning Category (Choose One)</label>
                <div class="radio-box-group">
                    <label class="radio-option"><input type="radio" name="zoning" value="none" class="calc-trigger" checked> None/Other</label>
                    <label class="radio-option"><input type="radio" name="zoning" value="com" class="calc-trigger"> Commercial</label>
                    <label class="radio-option"><input type="radio" name="zoning" value="ind" class="calc-trigger"> Industrial</label>
                </div>
            </div>

            <div class="form-group">
                <label>Access Road Type (Choose One)</label>
                <div class="radio-box-group">
                    <label class="radio-option"><input type="radio" name="road" value="none" class="calc-trigger" checked> None/Other</label>
                    <label class="radio-option"><input type="radio" name="road" value="earth" class="calc-trigger"> Earth Road</label>
                    <label class="radio-option"><input type="radio" name="road" value="tarmac" class="calc-trigger"> Tarmac Road</label>
                </div>
            </div>
            
            <div class="form-group" style="margin-top:20px;">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="v_water" class="calc-trigger" style="width:20px; height:20px; accent-color: var(--primary);"> Piped Water Connection
                </label>
            </div>
        </section>

        <section>
            <h2>Spatial Proximity & Physical Features</h2>
            <div class="input-grid">
                <div class="form-group">
                    <label>Terrain Type</label>
                    <select id="v_terrain" class="calc-trigger">
                        <option value="" disabled selected>-- Select Terrain --</option>
                        <option value="1">Flat</option>
                        <option value="2">Hilly</option>
                        <option value="3">Mountainous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Buildings <span class="unit">(Count)</span></label>
                    <input type="number" id="v_bldgs" class="calc-trigger" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Dist. to Electricity <span class="unit">(m)</span></label>
                    <input type="number" id="v_delec" class="calc-trigger" value="100" min="1">
                </div>
                <div class="form-group">
                    <label>Dist. to Access Road <span class="unit">(m)</span></label>
                    <input type="number" id="v_daccess" class="calc-trigger" value="50" min="2">
                </div>
                <div class="form-group">
                    <label>Dist. to Major Road <span class="unit">(m)</span></label>
                    <input type="number" id="v_dmajor" class="calc-trigger" value="500" min="1">
                </div>
                <div class="form-group">
                    <label>Dist. to Town Centre <span class="unit">(m)</span></label>
                    <input type="number" id="v_dtown" class="calc-trigger" value="2000" min="1">
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    const MODEL_COEFFICIENTS = {
        a0: 50000000, a1: 10000000, a2: 50000, a3: 5000000, a4: 15000000, a5: 8000000,
        a6: 20000000, a7: -500000, a8: 30000000, a9: 100000000, a10: 50000000, a11: 2000000
    };

    function calculateValuation() {
        const C = MODEL_COEFFICIENTS;
        const terrainInput = document.getElementById('v_terrain');
        
        if (!terrainInput.value) {
            document.getElementById('priceOutput').innerText = "Select Terrain...";
            document.getElementById('statusMessage').style.display = "block";
            return;
        }

        document.getElementById('statusMessage').style.display = "none";

        // Zoning Radio Logic
        const zoningVal = document.querySelector('input[name="zoning"]:checked').value;
        const com = (zoningVal === 'com') ? 1 : 0;
        const ind = (zoningVal === 'ind') ? 1 : 0;

        // Road Radio Logic
        const roadVal = document.querySelector('input[name="road"]:checked').value;
        const earth = (roadVal === 'earth') ? 1 : 0;
        const tarmac = (roadVal === 'tarmac') ? 1 : 0;

        const water = document.getElementById('v_water').checked ? 1 : 0;
        const d_elec = Math.max(1, parseFloat(document.getElementById('v_delec').value) || 1);
        const d_access = Math.max(2, parseFloat(document.getElementById('v_daccess').value) || 2);
        const d_major = Math.max(1, parseFloat(document.getElementById('v_dmajor').value) || 1);
        const d_town = Math.max(1, parseFloat(document.getElementById('v_dtown').value) || 1);
        const bldgs = Math.max(0, parseFloat(document.getElementById('v_bldgs').value) || 0);
        const terrain = parseFloat(terrainInput.value);

        // Calculation using the Non-Linear Model
        const price = C.a0 
            + (C.a1 * Math.pow(0.2, com)) 
            + (C.a2 * Math.pow(Math.exp(ind), 5)) 
            + (C.a3 * Math.pow(2, earth)) 
            + (C.a4 * tarmac) 
            + (C.a5 * water) 
            + (C.a6 * Math.pow(d_elec, -1.1)) 
            + (C.a7 * Math.pow(Math.log(d_access), 2)) 
            + (C.a8 * Math.pow(d_major, -1/12)) 
            + (C.a9 * Math.pow(d_town, -3.75)) 
            + (C.a10 * Math.pow(terrain, -11)) 
            + (C.a11 * Math.pow(bldgs, 0.67));

        const formatter = new Intl.NumberFormat('en-UG', {
            style: 'currency', currency: 'UGX', minimumFractionDigits: 0
        });

        document.getElementById('priceOutput').innerText = formatter.format(price);
    }

    document.querySelectorAll('.calc-trigger').forEach(el => {
        el.addEventListener('input', calculateValuation);
        el.addEventListener('change', calculateValuation);
    });
</script>

</body>
</html>
